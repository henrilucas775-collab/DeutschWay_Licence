<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab — Atelier d'allemand</title>
  <link rel="stylesheet" href="lab.css" />
</head>
<body>

<div class="lab" id="labRoot">

  <!-- Formes d'arrière-plan purement décoratives -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="shell">

    <!-- ─── SIDEBAR ─── -->
    <aside class="sidebar">
      <div class="sidebarBrand">
        <div class="brandBadge">
          <div class="brandIcon">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M3 7L10 2L17 7L10 12L3 7Z" />
              <path d="M3 12L10 17L17 12" />
              <path d="M3 7L3 12" />
              <path d="M17 7L17 12" />
            </svg>
          </div>
          <div>
            <div class="brandName">ATELIER</div>
            <div class="brandTag">espace</div>
          </div>
        </div>
        <button class="sidebarToggle" aria-label="Basculer la barre latérale">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
        </button>
      </div>

      <nav class="navSection">
        <div class="navLabel">Espace</div>

        <!-- Accueil -->
        <div class="navItem navItemActive" data-section="Accueil">
          <svg class="navIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 9L10 3L17 9V16C17 16.6 16.6 17 16 17H13V12H7V17H4C3.4 17 3 16.6 3 16V9Z" />
          </svg>
          <span class="navText">Accueil</span>
        </div>

        <!-- Cours -->
        <div class="navItem" data-section="Cours">
          <svg class="navIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="4" width="14" height="12" rx="1.5" />
            <path d="M7 8H13M7 11H11" />
          </svg>
          <span class="navText">Cours</span>
        </div>

        <!-- Apprendre -->
        <div class="navItem" data-section="Apprendre">
          <svg class="navIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 6L10 2L17 6L10 10L3 6Z" />
            <path d="M3 10L10 14L17 10" />
            <path d="M10 14L10 18" />
            <path d="M7 12L7 16" />
            <path d="M13 12L13 16" />
          </svg>
          <span class="navText">Apprendre</span>
        </div>

        <!-- Explorer -->
        <div class="navItem" data-section="Explorer">
          <svg class="navIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="10" r="7" />
            <path d="M13 7L8 13M8 7L13 13" />
          </svg>
          <span class="navText">Explorer</span>
        </div>

        <!-- Progression -->
        <div class="navItem" data-section="Progression">
          <svg class="navIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 16L6 10L9 13L13 6L16 8" />
            <circle cx="6" cy="10" r="1.2" fill="currentColor" stroke="none" />
            <circle cx="9" cy="13" r="1.2" fill="currentColor" stroke="none" />
            <circle cx="13" cy="6" r="1.2" fill="currentColor" stroke="none" />
            <circle cx="16" cy="8" r="1.2" fill="currentColor" stroke="none" />
          </svg>
          <span class="navText">Progression</span>
        </div>

        <!-- Account -->
        <div class="navItem" data-section="Account">
          <svg class="navIcon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="7" r="3.5" />
            <path d="M3 17C3 13.7 6.1 11 10 11C13.9 11 17 13.7 17 17" />
          </svg>
          <span class="navText">Account</span>
        </div>
      </nav>

      <div class="sidebarFooter">
        <div class="userChip" title="Se déconnecter">
          <div class="userAvatar">AL</div>
          <div class="userMeta">
            <div class="userName">Alex</div>
            <div class="userRole">Se déconnecter</div>
          </div>
          <svg class="logout-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </div>
      </div>
    </aside>

    <!-- ─── MAIN CONTENT ─── -->
    <div class="main">
      <header class="topbar">
        <div class="topbarLeft">
          <div class="breadcrumb">
            <span>Accueil</span>
            <span>›</span>
            <span>Lab</span>
            <span>›</span>
            <span class="breadcrumbCurrent" id="breadcrumbCurrent">Accueil</span>
          </div>
        </div>
        <div class="topbarActions">
          <button class="btnGhost">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4" /><path d="M10 10l2.5 2.5" /></svg>
            Explorer
          </button>
          <button class="btnGhost">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5.5" /><path d="M7 4.5v3l1.5 1.5" /></svg>
            Récent
          </button>
        </div>
      </header>

      <div class="content" id="sectionContent">
        <!-- Rempli dynamiquement par lab.js -->
      </div>
    </div>

  </div>
</div>

<script src="lab.js"></script>
</body>
</html>
